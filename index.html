<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NayzMiles — ROAD TO MARATHON</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{ color-scheme: dark;
  --bg0:#0d1124; --bg1:#171a36; --bg2:#241a33; --card:#1a1d36;
  --line:#3a3358; --txt:#fdf3e8; --dim:#bda893;
  --cyan:#f2812f; --mag:#f3b13a; --lime:#37b3a4; --gold:#f5c451; --violet:#e06a3a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:radial-gradient(1100px 560px at 82% -12%, #b3541e55 0, transparent 60%),
             radial-gradient(950px 520px at -8% 8%, #6a2a4a55 0, transparent 55%),
             radial-gradient(800px 600px at 50% 120%, #c9772033 0, transparent 55%),
             linear-gradient(165deg,#0d1124,#1a142e 55%,#241327);
  color:var(--txt); min-height:100vh; padding:18px 16px 60px; line-height:1.5;
}
.wrap{max-width:920px;margin:0 auto}
.mono{font-family:ui-monospace,'SF Mono',Menlo,monospace}
h1,h2,h3{letter-spacing:.5px}

/* HERO */
.hero{position:relative;border:1px solid var(--line);border-radius:20px;overflow:hidden;
  background:linear-gradient(135deg,#141a30,#0c1124);padding:22px 22px 20px;margin-bottom:16px;
  box-shadow:0 0 0 1px rgba(242,129,47,.10),0 22px 60px -22px rgba(242,129,47,.45)}
.hero::before{content:"";position:absolute;inset:0;background:
  repeating-linear-gradient(90deg,transparent,transparent 38px,rgba(34,211,238,.04) 39px,transparent 40px);pointer-events:none}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--cyan);border:1px solid rgba(34,211,238,.4);border-radius:999px;padding:3px 10px;background:rgba(34,211,238,.08)}
.hero h1{font-size:30px;font-weight:900;margin:10px 0 2px;
  background:linear-gradient(90deg,#fff,#9be7ff 40%,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{color:var(--dim);font-size:13px}
.lvlrow{display:flex;align-items:center;gap:14px;margin-top:16px;flex-wrap:wrap}
.lvlbadge{width:62px;height:62px;border-radius:16px;flex:0 0 auto;display:grid;place-items:center;
  background:linear-gradient(135deg,#1c2540,#0e1430);border:1px solid var(--cyan);
  box-shadow:0 0 18px -4px var(--cyan);position:relative}
.lvlbadge b{font-size:24px;font-weight:900;color:var(--cyan);line-height:1}
.lvlbadge span{position:absolute;top:6px;font-size:8px;letter-spacing:2px;color:var(--dim)}
.xpwrap{flex:1;min-width:200px}
.xpwrap .xptop{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:5px}
.xpbar{height:14px;border-radius:8px;background:#0a0f1f;border:1px solid var(--line);overflow:hidden;position:relative}
.xpfill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--mag));
  box-shadow:0 0 14px -1px var(--violet);transition:width .9s cubic-bezier(.2,.8,.2,1)}
.streakchip{display:flex;align-items:center;gap:6px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.4);
  border-radius:12px;padding:8px 12px;font-weight:800;color:var(--gold)}
.streakchip .n{font-size:20px}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

/* QUEST */
.quest{grid-column:1/-1;background:linear-gradient(135deg,#16203a,#0e1326);border:1px solid rgba(163,230,53,.3)}
.quest h2 .dot{background:var(--lime);box-shadow:0 0 8px var(--lime)}
.qtitle{font-size:20px;font-weight:900;margin-bottom:4px}
.qmeta{color:var(--dim);font-size:13px;margin-bottom:10px}
.qbox{background:#0b1122;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;margin-bottom:8px}
.qbox .lbl{color:var(--lime);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.qfocus{font-size:13px;color:#cdd6f4;font-style:italic;border-left:3px solid var(--mag);padding-left:10px;margin:10px 0}
.qbtn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:900;letter-spacing:1px;
  cursor:pointer;text-transform:uppercase;background:linear-gradient(90deg,var(--lime),#65d36e);color:#06210b;
  box-shadow:0 8px 24px -8px var(--lime);transition:transform .1s}
.qbtn:active{transform:scale(.98)}
.qbtn.done{background:linear-gradient(90deg,#1d2740,#222d4a);color:var(--lime);border:1px solid var(--lime);box-shadow:none;cursor:default}
.qbtn.rest{background:linear-gradient(90deg,#2a2150,#1a1638);color:var(--violet);box-shadow:0 8px 24px -10px var(--violet)}

/* STATS strip */
.statstrip{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:680px){.statstrip{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
.stat .v{font-size:24px;font-weight:900;line-height:1.1}
.stat .k{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-top:3px}
.c-cyan{color:var(--cyan)} .c-mag{color:var(--mag)} .c-lime{color:var(--lime)} .c-gold{color:var(--gold)} .c-violet{color:var(--violet)}

/* JOURNEY */
.journey{grid-column:1/-1}
.jbar{position:relative;height:8px;border-radius:6px;background:#0a0f1f;border:1px solid var(--line);margin:30px 6px 34px}
.jfill{position:absolute;left:0;top:0;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--mag));box-shadow:0 0 12px -1px var(--mag)}
.jnode{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;
  background:#0b1122;border:2px solid var(--dim);z-index:2}
.jnode.on{border-color:var(--cyan);box-shadow:0 0 12px var(--cyan);background:var(--cyan)}
.jnode .lab{position:absolute;top:24px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;color:var(--dim);text-align:center}
.jnode .lab b{display:block;color:var(--txt);font-size:12px}
.jnode.you{width:14px;height:14px;background:var(--lime);border-color:var(--lime);box-shadow:0 0 14px var(--lime)}
.jnode.you .lab{top:-34px}
.cdrow{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.cd{flex:1;min-width:150px;background:#0b1122;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.cd .race{font-size:13px;font-weight:800}
.cd .days{font-size:26px;font-weight:900}
.cd .when{font-size:11px;color:var(--dim)}

/* BADGES */
.badges{grid-column:1/-1}
.bgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:680px){.bgrid{grid-template-columns:repeat(3,1fr)}}
.badge{background:#0b1122;border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;opacity:.4;filter:grayscale(1);transition:.3s}
.badge.un{opacity:1;filter:none;border-color:rgba(251,191,36,.4);box-shadow:0 0 16px -6px var(--gold)}
.badge .ic{font-size:26px}
.badge .bt{font-size:11px;font-weight:800;margin-top:4px}
.badge .bd{font-size:9px;color:var(--dim);margin-top:2px;line-height:1.3}

/* LOG TABLE */
.logs{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--dim);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:9px 8px;border-bottom:1px solid #1a2138}
tr:last-child td{border-bottom:none}
.pill{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700}
.pill.run{background:rgba(34,211,238,.12);color:var(--cyan)}
.pill.walk{background:rgba(167,139,250,.14);color:var(--violet)}

.milychip{grid-column:1/-1;display:flex;gap:12px;align-items:flex-start;background:linear-gradient(135deg,#1a1430,#120e22);
  border:1px solid rgba(244,114,182,.3);border-radius:16px;padding:14px 16px}
.milychip .av{width:40px;height:40px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-size:20px;
  background:linear-gradient(135deg,#f472b6,#a78bfa)}
.milychip .mtxt{font-size:13px}
.milychip .mtxt b{color:var(--mag)}

details{margin-top:6px}
summary{cursor:pointer;color:var(--cyan);font-size:12px;font-weight:700;list-style:none;padding:6px 0}
summary::-webkit-details-marker{display:none}
summary::before{content:"▸ "}
details[open] summary::before{content:"▾ "}
.rintel{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:680px){.rintel{grid-template-columns:1fr}}
.rcard{background:#0b1122;border:1px solid var(--line);border-radius:14px;padding:14px}
.rcard.goal{border-color:rgba(251,191,36,.45);box-shadow:0 0 18px -8px var(--gold)}
.rcard h3{font-size:15px;margin-bottom:2px}
.rcard .rd{font-size:11px;color:var(--dim);margin-bottom:10px}
.rstat{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:5px 0;border-bottom:1px solid #161d33}
.rstat span:first-child{color:var(--dim);flex:0 0 auto}
.rstat span:last-child{text-align:right;font-weight:600}
.tiplist{margin:8px 0 0 16px;font-size:12px;color:#cdd6f4}
.tiplist li{margin:4px 0}
.drill{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #161d33;font-size:13px}
.drill:last-child{border:none}
.drill b{color:var(--lime);min-width:130px;display:inline-block}
.mani{font-size:13px;font-style:italic;color:#e7d2ff;line-height:1.95;text-align:center;padding:8px 4px}
.heroimg{width:100%;border-radius:14px;display:block;border:1px solid rgba(245,196,81,.3);box-shadow:0 10px 30px -12px rgba(0,0,0,.6)}
.herocap{text-align:center;color:var(--dim);font-size:12px;margin:10px 0 2px}
.finishvis{grid-column:1/-1;background:linear-gradient(135deg,#2a1830,#1a1430);border:1px solid rgba(242,129,47,.35)}
.fvwrap{display:grid;grid-template-columns:1.05fr .95fr;gap:12px;align-items:stretch}
@media(max-width:680px){.fvwrap{grid-template-columns:1fr}}
.fvwrap img{width:100%;height:100%;object-fit:cover;border-radius:12px;border:1px solid rgba(245,196,81,.25)}
.fvcap{margin-top:10px;text-align:center;font-style:italic;color:#f3d8b0;font-size:13px}
.fvcap b{color:var(--gold)}

.fvsingle img{max-width:420px;width:100%;display:block;margin:0 auto;border-radius:12px;border:1px solid rgba(245,196,81,.3)}
.wtabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.wtab{border:1px solid var(--line);background:#0b1122;color:var(--dim);border-radius:10px;padding:7px 15px;font-size:12px;font-weight:800;cursor:pointer}
.wtab.on{background:linear-gradient(90deg,var(--cyan),var(--violet));color:#1a0e06;border-color:transparent}
.wpanel{display:none}.wpanel.on{display:block}
.coachbox{display:flex;gap:10px;background:linear-gradient(135deg,#2a1c14,#1c1410);border:1px solid rgba(245,196,81,.3);border-radius:12px;padding:12px 14px;margin:4px 0 12px}
.coachbox .ic{font-size:20px;flex:0 0 auto}
.coachbox .ct{font-size:12.5px;font-style:italic;color:#f3d8b0;line-height:1.7}
.coachbox .ct b{color:var(--gold);font-style:normal}
.wday{border-bottom:1px solid #1a2138}
.wday summary{display:flex;align-items:center;gap:9px;padding:10px 2px;cursor:pointer;list-style:none}
.wday summary::-webkit-details-marker{display:none}
.wday summary::before{content:""}
.wday .dlabel{min-width:40px;font-weight:800;font-size:12px;color:var(--txt)}
.wpill{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:800;letter-spacing:.3px}
.t-run{background:rgba(242,129,47,.18);color:var(--cyan)}
.t-strength{background:rgba(55,179,164,.18);color:var(--lime)}
.t-walk{background:rgba(224,106,58,.2);color:var(--violet)}
.t-rest{background:#222a44;color:var(--dim)}
.wday .wt{font-size:13px;font-weight:600}
.wdetail{font-size:12px;color:#cdd6f4;padding:2px 0 12px 50px;line-height:1.8}
.wdetail .row span{color:var(--dim)}
.wfocus{border-left:3px solid var(--mag);padding-left:9px;font-style:italic;color:#f0dcc0;margin-top:6px}
.calhead{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:2px}
.calhead div{text-align:center;font-size:10px;color:var(--dim);font-weight:800}
.calrow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{aspect-ratio:1;border:1px solid var(--line);border-radius:10px;padding:3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:#0b1122;transition:.15s;position:relative}
.cell:hover{border-color:var(--cyan);transform:translateY(-1px)}
.cell.run{background:rgba(242,129,47,.15)}
.cell.strength{background:rgba(55,179,164,.14)}
.cell.walk{background:rgba(224,106,58,.15)}
.cell.rest{background:#141a30}
.cell .dnum{font-size:11px;font-weight:800}
.cell .demo{font-size:17px;line-height:1}
.cell.today{outline:2px solid var(--gold);outline-offset:1px}
.cell .chk{position:absolute;top:1px;right:4px;font-size:9px;color:var(--lime);font-weight:900}
.callegend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin-top:10px}
.caldetail{margin-top:10px;background:#0b1122;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.7}
.medalgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:680px){.medalgrid{grid-template-columns:repeat(2,1fr)}}
.medal{text-align:center;opacity:.42;filter:grayscale(.85);transition:.35s}
.medal.un{opacity:1;filter:none}
.medalwrap{position:relative;height:80px;margin-bottom:4px}
.ribs::before,.ribs::after{content:"";position:absolute;top:2px;left:50%;width:13px;height:34px;z-index:0;background:linear-gradient(180deg,#e0552c,#a8331a)}
.ribs::before{transform:translateX(-13px) rotate(13deg)}
.ribs::after{transform:translateX(0) rotate(-13deg)}
.disc{position:absolute;left:50%;top:18px;transform:translateX(-50%);width:60px;height:60px;border-radius:50%;display:grid;place-items:center;font-size:26px;z-index:1;background:radial-gradient(circle at 36% 30%,#3a3f55,#262a3d 55%,#1a1d2c);border:3px solid #3c4258;box-shadow:inset 0 -5px 9px rgba(0,0,0,.4)}
.medal.un .disc{background:radial-gradient(circle at 36% 30%,#ffe9a8,#f5b942 48%,#b8801f);border:3px solid #ffd874;box-shadow:0 0 0 3px rgba(245,196,81,.22),0 8px 20px -6px rgba(245,160,40,.5),inset 0 -5px 9px rgba(120,70,0,.35)}
.medal .nm{font-size:11px;font-weight:800}
.medal .ds{font-size:9px;color:var(--dim);margin-top:1px}
.dlabel{min-width:64px;display:flex;flex-direction:column;line-height:1.25}
.dlabel b{font-size:12px;color:var(--txt)}
.dlabel .dsub{font-size:10px;color:var(--dim);font-weight:600}
.diaryd{position:absolute;bottom:1px;right:4px;font-size:10px}
.diaryentry{border:1px solid var(--line);border-radius:12px;padding:2px 12px;margin-bottom:8px;background:#0b1122}
.diaryentry summary{display:flex;align-items:center;gap:9px;padding:10px 0;cursor:pointer;list-style:none;font-size:13px}
.diaryentry summary::-webkit-details-marker{display:none}
.diaryentry summary::before{content:"📖"}
.diaryentry .ddate{font-weight:800;font-size:12px;color:var(--gold);min-width:62px}
.diaryentry .dlbl{font-weight:600}
.dnote{font-size:13px;color:#e7d2ff;line-height:1.85;padding:2px 0 10px 6px;border-left:3px solid var(--mag);margin:0 0 8px 4px;padding-left:10px}
.dock{position:fixed;right:14px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:50}
.dockbtn{width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:rgba(26,29,54,.92);color:var(--txt);font-size:18px;cursor:pointer;box-shadow:0 6px 16px -6px rgba(0,0,0,.6);transition:.2s}
.dockbtn:hover{transform:translateY(-2px);border-color:var(--cyan)}
.dockbtn.on{background:linear-gradient(135deg,var(--cyan),var(--violet));border-color:transparent;box-shadow:0 0 16px -2px var(--cyan)}
#fxcanvas{position:fixed;inset:0;pointer-events:none;z-index:60}
.runnerfx{position:fixed;top:12px;left:-60px;font-size:34px;z-index:61;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.5))}
.runnerfx.go{animation:dash 2.2s cubic-bezier(.4,.1,.5,1) forwards}
@keyframes dash{from{left:-60px}to{left:112%}}
.statstrip .stat{animation:popin .5s ease both}
.statstrip .stat:nth-child(2){animation-delay:.07s}.statstrip .stat:nth-child(3){animation-delay:.14s}.statstrip .stat:nth-child(4){animation-delay:.21s}
@keyframes popin{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
.phasebar{position:relative;height:30px;border-radius:8px;overflow:hidden;display:flex;margin:14px 0 8px;border:1px solid var(--line)}
.phaseseg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.phaseseg.cur{box-shadow:inset 0 0 0 2px #fff}
.phaseyou{position:absolute;top:-3px;width:3px;height:36px;background:#fff;box-shadow:0 0 8px #fff;z-index:2;border-radius:2px}
.rdgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
@media(max-width:680px){.rdgrid{grid-template-columns:1fr 1fr}}
.rdbox{background:#0b1122;border:1px solid var(--line);border-radius:12px;padding:11px 13px}
.rdbox .lab{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--dim)}
.rdbox .big{font-size:21px;font-weight:900;line-height:1.15;margin:2px 0}
.rdbox .sub{font-size:10.5px;color:var(--dim);line-height:1.5}
.ok{color:var(--lime)}.warn{color:var(--gold)}
.msbar{position:relative;height:10px;border-radius:6px;background:#0b1122;border:1px solid var(--line);margin:26px 10px 34px}
.msfill{position:absolute;left:0;top:0;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--mag))}
.msnode{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:#0b1122;border:2px solid var(--dim);z-index:2}
.msnode.hit{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px var(--gold)}
.msnode .l{position:absolute;top:15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--dim);white-space:nowrap;text-align:center}
.msnode .l b{display:block;color:var(--txt);font-size:10px}
.galgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:680px){.galgrid{grid-template-columns:repeat(2,1fr)}}
.galgrid img{width:100%;height:120px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
.foot{text-align:center;color:var(--dim);font-size:11px;margin-top:22px}
.loading{grid-column:1/-1;text-align:center;color:var(--dim);padding:30px;font-size:14px}
.err{grid-column:1/-1;background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.3);color:#ffd5e8;border-radius:12px;padding:12px 14px;font-size:12px}
canvas{max-height:200px}
</style>
</head>
<body>
<div class="wrap">

<canvas id="fxcanvas"></canvas>
<div id="runnerfx" class="runnerfx">🏃</div>
<div class="dock">
  <button id="btnMusic" class="dockbtn" onclick="toggleMusic()" title="เพลงปลุกใจ (เปิด/ปิด)">🔇</button>
  <button class="dockbtn" onclick="playCheer()" title="เสียงเชียร์ 📣">📣</button>

const $=s=>document.querySelector(s);
function ymd(d){return d.toISOString().slice(0,10);}
function parseLogDate(s){ // "Wednesday 24 June 2026"
  const m=s.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/); if(!m)return null;
  const mo=MONTHS[m[2]]; if(mo===undefined)return null;
  return new Date(Date.UTC(+m[3],mo,+m[1]));
}
async function callTool(name,args){
  const r=await window.cowork.callMcpTool(name,args);
  if(r&&r.isError) throw new Error('tool error: '+name);
  let p=r&&r.structuredContent;
  if(p==null && r&&r.content&&r.content[0]&&r.content[0].text){
    try{p=JSON.parse(r.content[0].text);}catch(e){p=r.content[0].text;}
  }
  return p;
}
function b64utf8(b64){
  const bin=atob(b64); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
function parseRun(txt){
  const g=(re)=>{const m=txt.match(re);return m?m[1].trim():null;};
  const dateStr=g(/Date:\s*(.+)/);
  const date=dateStr?parseLogDate(dateStr):null;
  const act=g(/Activity:\s*(.+)/)||'';
  const distKm=parseFloat(g(/Distance:\s*([\d.]+)\s*km/)||'0');
  const durStr=g(/Duration:\s*([\d:]+)/);
  const hr=parseInt(g(/Avg Heart Rate:\s*(\d+)/)||'0');
  const kcal=parseInt(g(/Total Calories:\s*(\d+)/)||'0');
  const steps=parseInt((g(/Steps:\s*([\d,]+)/)||'0').replace(/,/g,''));
  const assign=g(/Assignment:\s*(.+)/)||'';
  const pm=txt.match(/Avg Pace:\s*(\d+)'(\d+)"/);
  const paceSec=pm?(+pm[1]*60+ +pm[2]):null;
  const isRun=/run/i.test(act);
  const nmt=txt.match(/Runner's Note:\s*([\s\S]*?)\n\s*---/);
  return {dateStr,date,act,distKm,durStr,hr,kcal,steps,assign,paceSec,isRun,note:nmt?nmt[1].trim():''};
}
function paceLabel(sec){if(!sec)return '—';const m=Math.floor(sec/60),s=sec%60;return m+"'"+String(s).padStart(2,'0')+'"';}

async function fetchRuns(){
  const res=await callTool(T_SEARCH,{query:"parentId = '"+RUN_LOGS_FOLDER+"' and mimeType = 'text/markdown'",pageSize:100});
  const files=(res&&res.files)||[];
  const mds=files.filter(f=>/markdown/.test(f.mimeType||'')||/Result/i.test(f.title||''));
  const out=[];
  for(const f of mds){
    try{
      const dl=await callTool(T_DOWNLOAD,{fileId:f.id});
      const txt=dl&&dl.content?b64utf8(dl.content):'';
      const r=parseRun(txt); r.id=f.id; r.title=f.title;
      if(r.date) out.push(r);
    }catch(e){/*skip*/}
  }
  out.sort((a,b)=>a.date-b.date);
  return out;
}

function computeXP(runs){let xp=0;runs.forEach(r=>{xp+=Math.round(r.distKm*100)+(r.isRun?20:0);});MANUAL_LOG.forEach(x=>xp+=x.xp||0);return xp;}
function activeDates(runs,ci){
  const set=new Set(runs.map(r=>ymd(r.date)));
  Object.keys(ci).forEach(k=>{if(ci[k])set.add(k);});
  MANUAL_LOG.forEach(x=>set.add(x.date));
  return set;
}
function streakFrom(set){
  let s=0;const d=new Date();d.setUTCHours(0,0,0,0);
  // allow today not yet done: start from today if present else yesterday
  if(!set.has(ymd(d)))d.setUTCDate(d.getUTCDate()-1);
  while(set.has(ymd(d))){s++;d.setUTCDate(d.getUTCDate()-1);}
  return s;
}
function todayQuest(){
  const now=new Date();now.setUTCHours(0,0,0,0);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(let i=0;i<PROGRAM_WEEKS.length;i++){
    const w=PROGRAM_WEEKS[i]; const sd=new Date(w.start+'T00:00:00Z');

let AC=null, musicNodes=null, musicOn=false;
function ensureAC(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}} if(AC.state==='suspended')AC.resume(); return AC; }
function startMusic(){
  const ac=ensureAC(); if(!ac||musicNodes)return;
  const master=ac.createGain(); master.gain.value=0; master.connect(ac.destination);
  const freqs=[146.83,220,277.18,329.63]; // warm uplifting Dmaj pad
  const oscs=freqs.map(fq=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=fq;const g=ac.createGain();g.gain.value=0.11;o.connect(g);g.connect(master);o.start();return o;});
  const lfo=ac.createOscillator();lfo.frequency.value=0.09;const lg=ac.createGain();lg.gain.value=0.05;lfo.connect(lg);lg.connect(master.gain);lfo.start();
  master.gain.linearRampToValueAtTime(0.16, ac.currentTime+2.2);
  musicNodes={master,oscs,lfo};
}
function stopMusic(){ if(!musicNodes||!AC)return; const m=musicNodes,t=AC.currentTime; m.master.gain.linearRampToValueAtTime(0,t+0.7); setTimeout(()=>{try{m.oscs.forEach(o=>o.stop());m.lfo.stop();}catch(e){} musicNodes=null;},800); }
window.toggleMusic=function(){ musicOn=!musicOn; const b=document.getElementById('btnMusic'); if(musicOn){startMusic();if(b){b.textContent='🎵';b.classList.add('on');}} else {stopMusic();if(b){b.textContent='🔇';b.classList.remove('on');}} try{localStorage.setItem('nayz_music',musicOn?'1':'0');}catch(e){} };
window.playCheer=function(){
  const ac=ensureAC(); if(!ac)return; const dur=1.7, t=ac.currentTime;
  const buf=ac.createBuffer(1, Math.floor(ac.sampleRate*dur), ac.sampleRate); const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=ac.createBufferSource(); src.buffer=buf;
  const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=0.8; bp.frequency.setValueAtTime(650,t); bp.frequency.linearRampToValueAtTime(1900,t+0.55);
  const g=ac.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.22,t+0.22); g.gain.linearRampToValueAtTime(0.16,t+0.9); g.gain.linearRampToValueAtTime(0,t+dur);
  src.connect(bp); bp.connect(g); g.connect(ac.destination); src.start(t); src.stop(t+dur);
  // whistle on top
  const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(1850,t);o.frequency.linearRampToValueAtTime(2300,t+0.18);const og=ac.createGain();og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(0.06,t+0.05);og.gain.linearRampToValueAtTime(0,t+0.3);o.connect(og);og.connect(ac.destination);o.start(t);o.stop(t+0.32);
};

function confettiBurst(){
  const c=document.getElementById('fxcanvas'); if(!c)return; const ctx=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const cols=['#f2812f','#f5c451','#37b3a4','#e06a3a','#f3b13a','#ffffff'];
  const P=[]; for(let i=0;i<90;i++)P.push({x:innerWidth/2+(Math.random()*240-120),y:innerHeight*0.26,vx:Math.random()*8-4,vy:Math.random()*-9-3,g:0.27,s:Math.random()*6+4,c:cols[i%cols.length],r:Math.random()*6,vr:Math.random()*0.3-0.15,life:0});
  let t0=performance.now();
  function step(t){const dt=Math.min(40,t-t0);t0=t;ctx.clearRect(0,0,c.width,c.height);let alive=false;P.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.life+=dt;if(p.y<c.height+30)alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.globalAlpha=Math.max(0,1-p.life/2400);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);ctx.restore();});if(alive&&P[0].life<2400)requestAnimationFrame(step);else ctx.clearRect(0,0,c.width,c.height);}
  requestAnimationFrame(step);
}
function dashRunner(){const r=document.getElementById('runnerfx');if(!r)return;r.classList.remove('go');void r.offsetWidth;r.classList.add('go');}
function countUp(id,target,dec,comma){const el=document.getElementById(id);if(!el)return;const rm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;const fmt=v=>{let n=dec?(+v).toFixed(dec):Math.round(v);return comma?(+n).toLocaleString(undefined,{minimumFractionDigits:dec||0,maximumFractionDigits:dec||0}):n;};if(rm){el.textContent=fmt(target);return;}const dur=900,t0=performance.now();function step(t){let p=Math.min(1,(t-t0)/dur);p=1-Math.pow(1-p,3);el.textContent=fmt(target*p);if(p<1)requestAnimationFrame(step);else el.textContent=fmt(target);}requestAnimationFrame(step);}

  grid.appendChild(chartCard);
  const distCard=document.createElement('div');distCard.className='card';distCard.style.gridColumn='1/-1';
  distCard.innerHTML=`<h2><span class="dot"></span>ระยะทางต่อ Session (km)</h2><div style="height:180px"><canvas id="distCh"></canvas></div>`;
  grid.appendChild(distCard);


  // ----- BADGES -----
  const minPace=Math.min(...runOnly.map(r=>r.paceSec||9999));
  const longest=runs.reduce((a,r)=>Math.max(a,r.distKm),0);
  const hrTrend=runOnly.length>=2 && runOnly[runOnly.length-1].hr>0 && runOnly[runOnly.length-1].hr<runOnly[0].hr;
  const wk1Runs=runOnly.filter(r=>r.date>=new Date(Date.UTC(2026,5,22))&&r.date<=new Date(Date.UTC(2026,5,28))).length;
  const BADGES=[
    {ic:'🥾',t:'First Steps',d:'บันทึกครั้งแรก',un:runs.length>=1},
    {ic:'🏃',t:'First Run',d:'วิ่งครั้งแรก',un:runOnly.length>=1},
    {ic:'🏅',t:'First 5K',d:'ระยะ ≥5km',un:runs.some(r=>r.distKm>=5)},
    {ic:'⚡',t:'Sub-11',d:'pace <11:00',un:minPace<660},
    {ic:'📊',t:'Data Nerd',d:'3 logs+',un:runs.length>=3},
    {ic:'🔥',t:'Streak 3',d:'3 วันติด',un:streak>=3},
    {ic:'❤️',t:'Aerobic Engine',d:'HR ลดลง',un:hrTrend},
    {ic:'📅',t:'Week 1 Done',d:'ครบ 3 วิ่ง',un:wk1Runs>=3},
    {ic:'🏋️',t:'Cross-Trainer',d:'ทำ Home Gym',un:MANUAL_LOG.some(x=>x.type==='strength')},
    {ic:'🔟',t:'10K Club',d:'session ≥10km',un:longest>=10},
    {ic:'🏔️',t:'Half Crusher',d:'≥21.1km',un:longest>=21.1},
    {ic:'💎',t:'30K Wall',d:'≥30km',un:longest>=30},
    {ic:'🔥',t:'7-Day Streak',d:'7 วันติด',un:streak>=7},
    {ic:'🏆',t:'Marathon',d:'≥42.195km',un:longest>=42.195}
  ];
  const bc=document.createElement('div');bc.className='card badges';
  bc.innerHTML=`<h2><span class="dot"></span>Medals · ${BADGES.filter(b=>b.un).length}/${BADGES.length} ปลดล็อก</h2>
    <div class="medalgrid">${BADGES.map(b=>`<div class="medal ${b.un?'un':''}"><div class="medalwrap"><div class="ribs"></div><div class="disc">${b.un?b.ic:'🔒'}</div></div><div class="nm">${b.t}</div><div class="ds">${b.d}</div></div>`).join('')}</div>`;
  grid.appendChild(bc);

  // ----- LOG TABLE -----
  const lc=document.createElement('div');lc.className='card logs';
  const rows=[...runs].reverse().map(r=>`<tr>
    <td>${r.date.toLocaleDateString('en-GB',{day:'2-digit',month:'short',timeZone:'UTC'})}</td>
    <td><span class="pill ${r.isRun?'run':'walk'}">${r.isRun?'RUN':'WALK'}</span></td>
    <td>${r.assign||'—'}</td>
    <td class="mono">${r.distKm.toFixed(2)}</td>
    <td class="mono">${paceLabel(r.paceSec)}</td>
    <td class="mono">${r.hr||'—'}</td>
  </tr>`).join('');
  lc.innerHTML=`<h2><span class="dot"></span>Training Log (${runs.length})</h2>
    <table><thead><tr><th>Date</th><th>Type</th><th>Session</th><th>KM</th><th>Pace</th><th>HR</th></tr></thead><tbody>${rows}</tbody></table>`;
  grid.appendChild(lc);

  // ----- DIARY -----
  const dia=document.createElement('div');dia.className='card';dia.style.gridColumn='1/-1';
  dia.innerHTML=`<h2><span class="dot"></span>📖 Diary · บันทึกความรู้สึก (การบ้านโค้ช)</h2>`+
    (diaryEntries.length?diaryEntries.map(e=>{const m=TYPEMETA[e.type]||TYPEMETA.run;return `<details class="diaryentry"><summary><span class="ddate">${e.date.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',timeZone:'UTC'})}</span><span class="wpill ${m[1]}">${m[2]}</span><span class="dlbl">${e.label}</span></summary><div class="dnote">${e.note.replace(/\n/g,'<br>')}</div></details>`;}).join(''):'<div style="color:var(--dim);font-size:12px">ยังไม่มีบันทึก — ส่งผลวิ่ง + โน้ตความรู้สึกให้ไมลี่ แล้วจะมาโผล่ที่นี่</div>');
  grid.appendChild(dia);

  // ----- MANIFESTO -----
  const man=document.createElement('div');man.className='card';man.style.gridColumn='1/-1';
  man.innerHTML=`<h2><span class="dot"></span>Manifesto · คำปฏิญาณ</h2>
    <details open><summary>🇹🇭 ฉบับภาษาไทย</summary><div class="mani">${MANIFESTO_TH}</div></details>
    <details><summary>🇺🇸 English Version</summary><div class="mani">${MANIFESTO_EN}</div></details>`;
  grid.appendChild(man);

  // ----- MILY -----
  const mc=document.createElement('div');mc.className='milychip';
  const line=MILY_LINES[(runs.length+streak)%MILY_LINES.length];
  mc.innerHTML=`<div class="av">♡</div><div class="mtxt"><b>ไมลี่:</b> ${line}${fromSnapshot?'<br><span style="color:var(--dim);font-size:11px">⚠️ ตอนนี้แสดงข้อมูลสำรอง — กด Reload เพื่อดึงสดจาก Drive อีกครั้งค่ะ</span>':''}</div>`;
  grid.appendChild(mc);

  // draw charts
  drawCharts(runOnly,runs);
}

let chPace,chDist;
function drawCharts(runOnly,all){
  const ctxP=document.getElementById('paceCh');
  if(ctxP&&runOnly.length){
    if(chPace)chPace.destroy();
    chPace=new Chart(ctxP,{type:'line',data:{
      labels:runOnly.map(r=>r.date.toLocaleDateString('en-GB',{day:'2-digit',month:'short',timeZone:'UTC'})),
      datasets:[{label:'Pace',data:runOnly.map(r=>r.paceSec),borderColor:'#f2812f',backgroundColor:'rgba(242,129,47,.16)',
        fill:true,tension:.35,pointBackgroundColor:'#f5c451',pointRadius:5,borderWidth:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>paceLabel(c.parsed.y)+' /km'}}},
        scales:{y:{reverse:true,ticks:{color:'#8b97bd',callback:v=>paceLabel(v)},grid:{color:'#1a2138'}},
                x:{ticks:{color:'#8b97bd'},grid:{color:'#1a2138'}}}}});
  }
  const ctxD=document.getElementById('distCh');
  if(ctxD&&all.length){
    if(chDist)chDist.destroy();
    chDist=new Chart(ctxD,{type:'bar',data:{
      labels:all.map(r=>r.date.toLocaleDateString('en-GB',{day:'2-digit',month:'short',timeZone:'UTC'})),
      datasets:[{label:'km',data:all.map(r=>r.distKm),
        backgroundColor:all.map(r=>r.isRun?'rgba(242,129,47,.8)':'rgba(55,179,164,.75)'),borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{ticks:{color:'#8b97bd'},grid:{color:'#1a2138'}},x:{ticks:{color:'#8b97bd'},grid:{display:false}}}}});
  }
}

(async function init(){
  try{
    RUNS=await fetchRuns();
    if(!RUNS.length){ render(SNAPSHOT,true); } else render(RUNS,false);
    onReady();
  }catch(e){
    render(SNAPSHOT,false);
    onReady();
  }
})();
</script>
</body>
</html>
